<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Niliana | نليانا - فخامة العناية الكورية</title>

<style>
:root {
    --emerald: #043927;
    --gold: #C5A059;
    --ivory: #F9F5F0;
}

body {
    font-family: 'Times New Roman', serif;
    background-color: var(--ivory);
    margin: 0;
    color: #2C2C2C;
}

/* Smooth scroll */
html { scroll-behavior: smooth; }

/* Header */
header {
    background: white;
    padding: 20px;
    text-align: center;
    border-bottom: 1px solid rgba(0,0,0,0.05);
}

header img {
    max-height: 90px;
}

/* Hero */
.hero {
    padding: 120px 20px;
    text-align: center;
    background: linear-gradient(to bottom, #ffffff, #f3f3f3);
}

.hero h1 {
    font-size: 3.2rem;
    color: var(--emerald);
    margin-bottom: 10px;
}

.hero p {
    font-size: 1.2rem;
    opacity: 0.8;
}

/* Image blend */
.blended-img {
    mask-image: linear-gradient(to bottom, rgba(0,0,0,1) 70%, rgba(0,0,0,0) 100%);
    -webkit-mask-image: linear-gradient(to bottom, rgba(0,0,0,1) 70%, rgba(0,0,0,0) 100%);
    width: 100%;
    max-width: 800px;
    display: block;
    margin: 30px auto;
}

/* Button */
.btn-whatsapp {
    background: var(--emerald);
    color: white;
    padding: 15px 45px;
    border-radius: 50px;
    text-decoration: none;
    font-weight: bold;
    box-shadow: 0 10px 25px rgba(4,57,39,0.25);
    transition: 0.3s;
}

.btn-whatsapp:hover {
    transform: scale(1.05);
}

/* Section */
.section {
    padding: 90px 20px;
    text-align: center;
}

/* Card */
.product-card {
    background: white;
    border-radius: 25px;
    padding: 40px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.07);
}

/* Price */
.price {
    font-size: 28px;
    color: var(--gold);
    font-weight: bold;
}

/* Features */
.features {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px,1fr));
    gap: 30px;
    margin-top: 40px;
}

.feature-box {
    background: white;
    padding: 25px;
    border-radius: 15px;
    box-shadow: 0 5px 20px rgba(0,0,0,0.05);
}

/* Dark section */
.dark {
    background: var(--emerald);
    color: white;
}

/* Footer */
footer {
    padding: 40px;
    text-align: center;
    background: white;
    border-top: 1px solid rgba(0,0,0,0.05);
}
</style>
</head>

<body>

<header>
    <img src="images/logo.jpg" alt="Niliana Logo">
</header>

<!-- HERO -->
<section class="hero">
    <h1>Niliana Premium</h1>
    <p>سر البشرة الزجاجية في قناع واحد</p>

    <img src="images/water-drop-blended.jpg" class="blended-img">

    <a href="https://wa.me/201109048989" class="btn-whatsapp">
        اطلبي الآن عبر واتساب
    </a>
</section>

<!-- FEATURES -->
<section class="section">
    <h2 style="color: var(--emerald);">لماذا Niliana؟</h2>

    <div class="features">
        <div class="feature-box">
            💧 ترطيب عميق
        </div>

        <div class="feature-box">
            ✨ إشراقة فورية
        </div>

        <div class="feature-box">
            🔬 مضاد للشيخوخة
        </div>

        <div class="feature-box">
            💎 شد ونضارة
        </div>
    </div>
</section>

<!-- PRODUCT -->
<section class="section">
    <h2 style="color: var(--emerald); border-bottom: 2px solid var(--gold); display: inline-block;">
        منتجنا الرائد
    </h2>

    <div class="product-card">
        <img src="images/product-main.jpg" style="width:100%; max-width:500px; border-radius:20px;">
        <p class="price">275 EGP</p>

        <a href="https://wa.me/201109048989" class="btn-whatsapp">
            اشتري الآن
        </a>
    </div>
</section>

<!-- BRAND -->
<section class="section dark">
    <h2>هوية الفخامة</h2>
    <img src="images/branding.jpg" class="blended-img">
</section>

<!-- USAGE -->
<section class="section">
    <h2>طريقة الاستخدام</h2>
    <img src="images/usage.png" style="width:100%; max-width:900px; border-radius:20px;">
</section>

<!-- LIFESTYLE -->
<section class="section">
    <h2>إشراقة تدوم</h2>
    <img src="images/aesthetic.jpg" class="blended-img">
</section>

<!-- FINAL CTA -->
<section class="section dark">
    <h2>جاهزة لبشرة مثالية؟</h2>
    <a href="https://wa.me/201109048989" class="btn-whatsapp">
        اطلبي الآن
    </a>
</section>

<footer>
    <p>&copy; 2026 Niliana. جميع الحقوق محفوظة.</p>
</footer>

</body>
</html>
