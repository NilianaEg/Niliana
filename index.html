<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Niliana | ماسك الكولاجين الكوري الفاخر</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>
:root {
    --emerald: #043927;
    --gold: #C5A059;
    --ivory: #F9F5F0;
    --black: #0a0a0a;
    --dark-gray: #1a1a1a;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    font-family: 'Cairo', sans-serif;
    background: var(--black);
    color: var(--ivory);
    overflow-x: hidden;
    line-height: 1.8;
}

/* ===== شريط التوصيل ===== */
.delivery-bar {
    background: var(--emerald);
    color: var(--gold);
    text-align: center;
    padding: 12px;
    font-weight: 600;
    font-size: 0.95rem;
}

header {
    background: linear-gradient(to bottom, var(--dark-gray), var(--black));
    padding: 30px 20px;
    text-align: center;
    border-bottom: 1px solid rgba(197, 160, 89, 0.3);
}

.main-logo-img { max-height: 80px; }

/* ===== سكشن الفيديوهات (التنسيق الأول الأنيق) ===== */
.video-section {
    padding: 60px 20px;
    text-align: center;
    background: var(--black);
}

.video-grid {
    display: flex;
    overflow-x: auto;
    gap: 20px;
    padding: 20px 10px;
    scroll-snap-type: x mandatory;
    scrollbar-width: none;
}

.video-grid::-webkit-scrollbar { display: none; }

.video-item {
    flex: 0 0 300px;
    scroll-snap-align: center;
    border-radius: 20px;
    overflow: hidden;
    border: 1px solid var(--gold);
    background: #000;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

.video-item video {
    width: 100%;
    height: 500px;
    object-fit: cover;
    display: block;
}

/* ===== باقي الأقسام ===== */
.hero-section { padding: 40px 20px; text-align: center; }
.product-title { font-size: 2.5rem; color: var(--gold); margin-bottom: 15px; }
.product-image { max-width: 500px; width: 90%; border-radius: 20px; }

.features-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; max-width: 600px; margin: 40px auto; }
.feature-item { background: rgba(255,255,255,0.03); border: 1px solid rgba(197, 160, 89, 0.2); padding: 20px; border-radius: 15px; }

.order-section { background: var(--dark-gray); padding: 60px 20px; text-align: center; }
.order-card { border: 2px solid var(--gold); border-radius: 25px; padding: 40px 30px; max-width: 450px; margin: 0 auto; }
.current-price { font-size: 3rem; color: var(--gold); font-weight: 700; }

.cta-button {
    display: inline-block;
    background: var(--emerald);
    color: white;
    padding: 20px 50px;
    border-radius: 50px;
    text-decoration: none;
    font-weight: 700;
    margin-top: 20px;
    border: 1px solid var(--gold);
}

/* ===== التوقيع والفوتر ===== */
.designer-signature {
    padding: 20px;
    background: #000;
    text-align: center;
    font-size: 0.8rem;
    color: #444;
    border-top: 1px solid #111;
}

.designer-signature span {
    color: var(--gold);
    font-weight: bold;
    letter-spacing: 1px;
}

footer { padding: 20px; text-align: center; background: #000; color: #555; }

@media (max-width: 768px) {
    .video-item { flex: 0 0 280px; }
}
</style>
</head>

<body>

<div class="delivery-bar">🚚 توصيل مجاني لكل المحافظات اليوم فقط 🚨</div>

<header>
    <img src="images/logo.jpg" alt="Niliana" class="main-logo-img">
</header>

<section class="hero-section">
    <h2 class="product-title">قناع الكولاجين الكوري</h2>
    <p style="color: #aaa;">نضارة فورية من أول استخدام</p>
    <div style="margin-top: 30px;">
        <img src="images/product-main.jpg" alt="Niliana Mask" class="product-image">
    </div>
</section>

<section class="video-section">
    <h3 style="color: var(--gold); margin-bottom: 20px;">تجارب Niliana الواقعية ✨</h3>
    <div class="video-grid">
        <div class="video-item"><video controls><source src="images/review1.mp4" type="video/mp4"></video></div>
        <div class="video-item"><video controls><source src="images/review2.mp4" type="video/mp4"></video></div>
        <div class="video-item"><video controls><source src="images/review3.mp4" type="video/mp4"></video></div>
        <div class="video-item"><video controls><source src="images/review4.mp4" type="video/mp4"></video></div>
    </div>
</section>

<section class="hero-section">
    <div class="features-grid">
        <div class="feature-item">✨ نضارة زجاجية</div>
        <div class="feature-item">🌙 ثبات كامل</div>
        <div class="feature-item">💎 شد فوري</div>
        <div class="feature-item">💧 ترطيب مكثف</div>
    </div>
</section>

<section class="order-section">
    <div class="order-card">
        <img src="images/branding.jpg" style="max-width:100%; border-radius:10px; margin-bottom:15px;">
        <div class="current-price">275 EGP</div>
        <a href="https://wa.me/201109048989" class="cta-button">اطلبي الآن <i class="fab fa-whatsapp"></i></a>
    </div>
</section>

<footer>
    <p>© 2026 Niliana Luxury Skincare</p>
</footer>

<div class="designer-signature">
    Designed with Luxury by <span>Amro Abd Elaziz</span>
</div>

<script>
    const allVideos = document.querySelectorAll('video');

    allVideos.forEach(video => {
        video.addEventListener('play', function() {
            // لما فيديو يشتغل، وقف كل الفيديوهات التانية
            allVideos.forEach(otherVideo => {
                if (otherVideo !== video) {
                    otherVideo.pause();
                }
            });
        });
    });
</script>

</body>
</html>
