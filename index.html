<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Niliana | نليانا - الفخامة الكورية</title>
    
    <link rel="stylesheet" href="css/style.css">
    <script src="js/modernizr.js"></script>

    <style>
        :root {
            --emerald: #043927;
            --gold: #C5A059;
            --ivory: #F9F5F0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--ivory);
            margin: 0;
            overflow-x: hidden;
        }

        /* جعل الصورة دايبة في الخلفية */
        .blended-image {
            mask-image: linear-gradient(to bottom, rgba(0,0,0,1) 70%, rgba(0,0,0,0));
            -webkit-mask-image: linear-gradient(to bottom, rgba(0,0,0,1) 70%, rgba(0,0,0,0));
            max-width: 100%;
            height: auto;
        }

        .hero-section {
            position: relative;
            padding: 100px 5%;
            background: linear-gradient(180deg, rgba(249,245,240,0) 0%, rgba(249,245,240,1) 100%), 
                        url('images/hero-bg.jpg') center/cover no-repeat;
            text-align: center;
        }

        .hero-content {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 30px;
            display: inline-block;
            border: 1px solid rgba(197, 160, 89, 0.3);
        }

        .product-showcase {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 80px 10%;
            gap: 50px;
            flex-wrap: wrap;
        }

        /* تأثير الصورة المتداخلة */
        .floating-img {
            max-width: 450px;
            filter: drop-shadow(0 20px 30px rgba(0,0,0,0.1));
            transition: transform 0.3s ease;
        }

        .floating-img:hover { transform: translateY(-10px); }

        .btn-gold {
            background: var(--emerald);
            color: white;
            padding: 18px 45px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            box-shadow: 0 10px 20px rgba(4, 57, 39, 0.2);
            display: inline-block;
        }
