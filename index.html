<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Niliana | ماسك الكولاجين الكوري الفاخر</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root {
            --emerald: #043927; /* اللون الزمردي الداكن */
            --gold: #C5A059;    /* الذهبي الملكي */
            --ivory: #F9F5F0;   /* العاجي الفاتح */
            --black: #0a0a0a;
            --dark-gray: #1a1a1a;
            --red: #c62828;
        }

        /* تحسينات عامة */
        body {
            font-family: 'Cairo', sans-serif;
            background: var(--black);
            color: var(--ivory);
            line-height: 1.8;
            scroll-behavior: smooth;
        }

        /* شريط التوصيل - حركة أنعم */
        .delivery-bar {
            background: var(--emerald);
            color: var(--gold);
            text-align: center;
            padding: 10px;
            font-weight: 700;
            font-size: 0.9rem;
            border-bottom: 1px solid var(--gold);
        }

        /* الهيدر - التركيز على اللوجو */
        header {
            padding: 50px 20px;
            background: radial-gradient(circle at center, #151515 0%, #0a0a0a 100%);
            border-bottom: 1px solid rgba(197, 160, 89, 0.1);
        }

        .main-logo-img {
            max-width: 280px;
            filter: drop-shadow(0 0 15px rgba(197, 160, 89, 0.2));
            transition: transform 0.5s ease;
        }

        .main-logo-img:hover {
            transform: scale(1.02);
        }

        /* كروت العروض - لمسة ديور */
        .offer-card {
            background: linear-gradient(145deg, #111, #050505);
            border: 1px solid rgba(197, 160, 89, 0.2);
            border-radius: 0px; /* تصميم حاد وأنيق */
            padding: 30px 20px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .offer-card.best {
            border: 1px solid var(--gold);
            background: linear-gradient(145deg, #0d1a15, #043927);
        }

        .order-btn {
            background: transparent;
            color: var(--gold);
            border: 1px solid var(--gold);
            padding: 15px 30px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
        }

        .order-btn:hover {
            background: var(--gold);
            color: var(--emerald);
            box-shadow: 0 0 20px rgba(197, 160, 89, 0.4);
        }

        /* تحسين الأكورديون */
        .accordion-item {
            border: none;
            border-bottom: 1px solid rgba(197, 160, 89, 0.1);
            background: transparent;
        }

        .accordion-header {
            color: var(--ivory);
            padding: 20px 0;
            font-weight: 400;
        }

        .accordion-item.active .accordion-header {
            color: var(--gold);
        }

        /* توقيع المصمم - أكثر هدوءاً */
        .designer-signature {
            opacity: 0.6;
            font-size: 0.8rem;
            margin-top: 50px;
        }
    </style>
</head>
<body>
    </body>
</html>
